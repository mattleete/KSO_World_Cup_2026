name: Refresh WC2026 fixtures

# Fetches the WC2026 /matches feed on a schedule and caches it in Supabase
# (table: match_feed, single row id='wc2026'). All clients read that table
# instead of calling the API directly, so API usage no longer scales with the
# number of viewers. Every 20 minutes = 72 calls/day, under the 100/day cap
# (leaves headroom for the occasional manual run below).

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch: {}   # allows a manual "Run workflow" from the Actions tab

# Never let two refreshes run at once.
concurrency:
  group: refresh-fixtures
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch WC2026 feed and cache it in Supabase
        env:
          WC2026_API_KEY: ${{ secrets.WC2026_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          # 1. Pull the live feed. -f makes curl fail (non-zero) on HTTP errors,
          #    so a bad/disabled key aborts the job and leaves the cache intact.
          MATCHES=$(curl -fsS -H "Authorization: Bearer ${WC2026_API_KEY}" \
            "https://api.wc2026api.com/matches")

          # 2. Sanity-check it's a JSON array before caching it.
          echo "$MATCHES" | jq -e 'type == "array"' > /dev/null
          echo "Fetched $(echo "$MATCHES" | jq 'length') matches."

          # 3. Build the upsert row and write it (service_role bypasses RLS).
          PAYLOAD=$(jq -n --argjson m "$MATCHES" \
            '{id: "wc2026", matches: $m, fetched_at: (now | todateiso8601)}')

          curl -fsS -X POST "${SUPABASE_URL}/rest/v1/match_feed" \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            --data "$PAYLOAD" > /dev/null

          echo "Cached feed to Supabase match_feed."
