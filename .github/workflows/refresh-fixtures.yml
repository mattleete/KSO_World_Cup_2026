name: Refresh WC2026 fixtures

# GitHub's `schedule` event is unreliable for short intervals — in practice it
# fires every few HOURS, not every 5 min, so the cache lagged badly during live
# matches. Instead, each job runs a long-lived loop that fetches every 5 min for
# ~5h40m. `concurrency` (cancel-in-progress: false) means a freshly-scheduled
# run queues and takes over the moment the current job ends, so fetching stays
# ~continuous regardless of when GitHub actually fires the schedule.
# ~286 API calls/day (under the 500/day plan). Public repo => Actions minutes
# are unlimited. workflow_dispatch lets you (re)start the chain manually.

on:
  schedule:
    - cron: '*/15 * * * *'   # frequent restart attempts; concurrency keeps just one alive
  workflow_dispatch: {}

concurrency:
  group: refresh-fixtures
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 350     # ~5h50m, under GitHub's 6h job limit
    steps:
      - name: Continuously cache the WC2026 feed (every 5 min)
        env:
          WC2026_API_KEY: ${{ secrets.WC2026_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # No `-e`: a transient API/Supabase hiccup must not kill the whole loop.
          set -uo pipefail
          deadline=$(( $(date +%s) + 340*60 ))   # loop ~5h40m, then the queued run takes over
          while [ "$(date +%s)" -lt "$deadline" ]; do
            if MATCHES=$(curl -fsS -H "Authorization: Bearer ${WC2026_API_KEY}" "https://api.wc2026api.com/matches") \
               && echo "$MATCHES" | jq -e 'type == "array"' >/dev/null 2>&1; then
              PAYLOAD=$(jq -n --argjson m "$MATCHES" '{id: "wc2026", matches: $m, fetched_at: (now | todateiso8601)}')
              if curl -fsS -X POST "${SUPABASE_URL}/rest/v1/match_feed" \
                   -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
                   -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
                   -H "Content-Type: application/json" \
                   -H "Prefer: resolution=merge-duplicates" \
                   --data "$PAYLOAD" >/dev/null; then
                echo "$(date -u +%H:%M:%S) refreshed $(echo "$MATCHES" | jq length) matches"
              else
                echo "$(date -u +%H:%M:%S) supabase write failed (will retry next cycle)"
              fi
            else
              echo "$(date -u +%H:%M:%S) feed fetch failed (will retry next cycle)"
            fi
            sleep 300
          done
